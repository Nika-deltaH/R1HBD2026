<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>R1HBD2026</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Loading Screen -->
    <div id="loading-screen">
        <div class="loader"></div>
        <h2>Loading Resources...</h2>
        <p id="loading-progress">0%</p>
    </div>

    <div id="main-wrapper">
        <div id="game-container">
            <!-- Header (Game Over + Score) -->
            <div id="game-header" class="hidden">
                <h1>Game Over</h1>
                <p>Score: <span id="final-score">0</span></p>
            </div>
            <!-- Canvas will be injected here -->
            <div id="ui-layer">
                <div id="score-board">Score: <span id="score">0</span></div>
                <div class="top-controls">
                    <button id="settings-btn" title="Settings">⚙️</button>
                    <button id="retry-btn-top" title="Reset Game">↻</button>
                </div>
                <!-- Next Ball Preview -->
                <div id="next-preview-container">
                    <span>Next</span>
                    <div id="next-ball-1" class="preview-slot"></div>
                </div>
            </div>
            <!-- Footer (Buttons) -->
            <div id="game-footer" class="hidden">
                <button id="retry-btn">Retry</button>
                <button id="share-btn">Share</button>
                <button id="screenshot-btn">Save Image</button>
                <div class="support-links-mini">
                    <a href="https://p.ecpay.com.tw/4D5B9BD" target="_blank">鼓勵Nika</a>
                    <a href="https://ko-fi.com/nikaworx" target="_blank">Support Nika</a>
                    <a href="https://twitter.com/deltah_twi" target="_blank">X (Twitter)</a>
                </div>
            </div>
        </div>

        <!-- Settings Modal -->
        <div id="settings-modal" class="hidden">
            <div class="modal-content">
                <h2>Settings</h2>
                <div class="setting-item">
                    <label>BGM Volume</label>
                    <input type="range" id="bgm-volume" min="0" max="100" value="50">
                </div>
                <div class="setting-item">
                    <label>SFX Volume</label>
                    <input type="range" id="sfx-volume" min="0" max="100" value="50">
                </div>
                <div class="setting-item toggle-setting">
                    <label>唐突衛教</label>
                    <input type="checkbox" id="edu-toggle" checked>
                </div>
                <div class="setting-item support-section">
                    <p>聯絡Nika</p>
                    <div class="support-btns">
                        <a href="https://www.plurk.com/deltaH" target="_blank" class="support-btn">Plurk</a>
                        <a href="https://twitter.com/deltah_twi" target="_blank" class="support-btn">X (Twitter)</a>
                    </div>
                </div>
                <button id="close-settings">Close</button>
            </div>
        </div>

        <!-- In-Game CM Window -->
        <div id="cm-window" class="hidden game-modal">
            <div class="modal-box cm-box" id="cm-box">
                <button class="close-modal-btn" id="close-cm">X</button>
                <div class="cm-content">
                    <a id="cm-link" href="#" target="_blank" class="blue-capsule-btn">馬上收看</a>
                </div>
            </div>
        </div>

        <!-- End-Game ED Window -->
        <div id="ed-window" class="hidden game-modal">
            <div class="modal-box ed-box" id="ed-box">
                <button class="close-modal-btn" id="close-ed">X</button>
            </div>
        </div>

    </div>

    <!-- html2canvas -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <!-- Matter.js from CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
